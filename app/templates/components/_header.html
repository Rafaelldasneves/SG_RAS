{% load static %}

<header class="ras-header fixed-top">

    <!-- FAIXA SUPERIOR -->
    <div class="ras-top container-fluid">

        <div class="row align-items-center">

            <!-- LOGO ESQUERDA -->
            <div class="col-3 col-md-2 text-center">
                <img src="{% static 'img/Logo_GCM.png' %}" class="ras-logo">
            </div>

            <!-- TITULO -->
            <div class="col-6 col-md-8 text-center text-white">

                <h2 class="ras-title d-none d-md-block">
                    SISTEMA DE GERENCIAMENTO DE – RAS –
                </h2>

                <h5 class="d-md-none">
                    SISTEMA RAS
                </h5>

                <p class="ras-subtitle d-none d-md-block">
                    (REGIME ADICIONAL DE SERVIÇO)
                </p>

            </div>

            <!-- LOGO DIREITA -->
            <div class="col-3 col-md-2 text-center">
                <img src="{% static 'img/Logo_GPCM.png' %}" class="ras-logo">
            </div>

        </div>

    </div>


    <!-- MENU -->
    <nav class="navbar navbar-expand-md ras-menu">

        <div class="container-fluid">

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuRAS">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse justify-content-right" id="menuRAS">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="menu-btn" href="{% url 'home' %}">Início</a>
                    </li>

                    <li class="nav-item">
                        <a class="menu-btn" href="#">Marcação</a>
                    </li>

                    <li class="nav-item">
                        <a class="menu-btn" href="#">Minhas Marcações</a>
                    </li>

                    <li class="nav-item">
                        <a class="menu-btn" href="#">Gestor</a>
                    </li>

                </ul>

            </div>


            <!-- BOTÃO SAIR -->
            <form action="{% url 'logout' %}" method="post" class="logout-form">
                {% csrf_token %}
                <button class="logout-btn">
                    Sair
                </button>
            </form>

        </div>

    </nav>

</header>

<style>
 /* HEADER */

.ras-header{
    background: linear-gradient(90deg,#082c6c,#0d4fb8);
    color:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* TOPO */

.ras-top{
    padding:20px 10px;
}

/* LOGOS */

.ras-logo{
    height:70px;
}

/* TITULO */

.ras-title{
    font-weight:700;
    letter-spacing:1px;
}

.ras-subtitle{
    margin:0;
    opacity:0.9;
}

/* MENU */

.ras-menu{
    background:#0a2c63;
    padding:10px 20px;
}

/* BOTÕES MENU */

.menu-btn{
    display:inline-block;
    padding:8px 20px;
    margin:5px;
    color:white;
    text-decoration:none;
    background:#123b84;
    border-radius:8px;
    transition:0.3s;
    font-weight:500;
}

.menu-btn:hover{
    background:#1f56b8;
}

/* BOTÃO SAIR */

.logout-btn{
    background:#1a2b4c;
    color:white;
    border:none;
    padding:8px 20px;
    border-radius:8px;
    transition:0.3s;
}

.logout-btn:hover{
    background:#dc3545;
}

/* MOBILE */

@media (max-width:768px){

.ras-logo{
    height:45px;
}

.ras-title{
    font-size:18px;
}

}
</style>
