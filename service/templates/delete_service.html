{% extends 'base.html' %}

{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/style_login.css' %}">
{% endblock %}

{% block content %}

<div class="container mt-4">
    <h3 class="display-6"> Excluir Serviço </h3>
    
    <div class="card">
        <div class="card-body">
            <p class="card-text display-6">Deseja excluir o RAS do dia <strong>{{ service.date|date:"d/m/y" }} ({{ service.time_start }} as {{ service.time_end }}) </strong> ? </p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger"> Deletar </button>
            </form>
            <a href="{% url 'list_services' %}" class="btn btn-secondary mt-3">Retornar Lista Serviços</a>
        </div>

    </div>
</div>
    

{%endblock%}
