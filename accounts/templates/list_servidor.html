{% extends 'base.html' %}

{% block content %}

<div class="table-responsive">
    <table class="table table-striped table-bordered">
        <thead class="thead-dark">
            <tr>
                <th> Cargo</th>
                <th> Nome de Guerra </th>
                <th> Matrícula </th>
                <th> Data de Admissão </th>
                <th> Ações </th>
            </tr>

        </thead>

        <tbody>
            {% for servidor in servidores %}
            <tr>
                <td> {{ servidor.position }} </td>
                <td> {{ servidor.username }} </td>                
                <td> {{ servidor.registration }} </td>
                <td> {{ servidor.admission_date }} </td>
                <td> 
                    <a href="{% url 'detail_servidor' servidor.id %}" class="btn btn-info btn-sm">
                        <i class="bi bi-eye"></i>
                    </a>
                      <a href="{% url 'update_servidor' servidor.id %}" class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil"></i>
                    </a>
                      <a href="{% url 'delete_servidor' servidor.id %}" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            {% endfor%}
        </tbody>
    </table>

{%endblock%}
